services:
  db:
    image: postgres:16
    container_name: luxury-postgres
    environment:
      POSTGRES_DB: luxury_ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luxury_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai_service:
    build:
      context: ./ai_advisor_service
      dockerfile: Dockerfile
    container_name: luxury-ai-advisor
    ports:
      - "8001:8001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luxury-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/luxury_ecommerce
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      AI_PYTHON_BASE_URL: http://ai_service:8001
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      ai_service:
        condition: service_started
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: luxury-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
