# Server Configuration
server.port=8080
spring.application.name=luxury-ecommerce

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/luxury_ecommerce
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
jwt.expiration=86400000

# CORS Configuration
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Logging
logging.level.com.luxury.ecommerce=DEBUG
logging.level.org.springframework.security=DEBUG

# Python Semantic Advisor
ai.python.enabled=true
ai.python.base-url=http://localhost:8001
ai.python.timeout-ms=5000
